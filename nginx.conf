server {
    listen 8888;
    server_name localhost;

    # 静态资源：钉死目录，避免 root 跑偏
    location ^~ /assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA 路由兜底
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
